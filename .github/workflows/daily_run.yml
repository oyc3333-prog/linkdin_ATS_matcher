# =============================================================================
# daily_run.yml — Full LinkedIn pipeline, runs every day at 00:00 UTC
#
# Flow (all inside linkdin_scraper.py):
#   1. Scrape job IDs and details from LinkedIn guest API
#   2. Encode descriptions into BERT vectors (semantic search)
#   3. Classify each job via Gemini LLM (category + level)
#   4. Deduplicate DB by URL and description
#   5. Extract skills per job
#   6. Upload jobs + skills to Google Sheets (calls upload_to_sheets.py)
#
# Triggers:
#   - schedule: every day at midnight UTC
#   - workflow_dispatch: manual run from GitHub Actions UI
#
# Required secrets (set in repo Settings → Secrets → Actions):
#   - GOOGLE_API_KEY         — Gemini API key for LLM classification
#   - GCP_SERVICE_ACCOUNT_JSON — Full Google service account JSON for Sheets upload
# =============================================================================

name: LinkedIn Daily Scraper

on:
  schedule:
    - cron: '0 0 * * *'   # Every day at 00:00 UTC
  workflow_dispatch:       # Allow manual trigger from GitHub UI

jobs:
  scrape_classify_upload:
    runs-on: ubuntu-latest

    steps:
      # Check out the repository so the runner has access to all scripts and the DB
      - name: Checkout code
        uses: actions/checkout@v3

      # Set up Python 3.11 — matches local development environment
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # Install all dependencies needed by the full pipeline:
      # - requests, beautifulsoup4: scraping
      # - sentence_transformers: BERT embeddings
      # - langchain-google-genai, langchain-core, pydantic: LLM classification
      # - gspread, google-auth: Google Sheets upload
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pandas sqlalchemy \
                      sentence_transformers \
                      langchain-google-genai langchain-core pydantic \
                      gspread google-auth

      # Run the full pipeline — scrape → embed → classify → dedup → skills → sheets
      # Both secrets are passed as environment variables consumed inside the scripts
      - name: Scrape, classify and upload to Sheets
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}           # Used by Gemini LLM
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}  # Used by upload_to_sheets.py
        run: python linkdin_scraper.py

      # Commit the updated DB back to the repo so the Streamlit app always has fresh data
      # "|| exit 0" prevents failure if there are no changes to commit
      - name: Commit updated DB
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add linkedin_jobs.db
          git commit -m "Auto-update jobs" || exit 0
          git push
