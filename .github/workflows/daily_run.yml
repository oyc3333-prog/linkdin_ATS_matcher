name: LinkedIn Daily Scraper

on:
  schedule:
    # מריץ כל לילה ב-00:00 (זמן UTC)
    - cron: '0 0 * * *'
  workflow_dispatch: # מאפשר לך להריץ ידנית לבדיקה

jobs:
  scrape_and_commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pandas  # הוספתי את הספריות שאתה צריך

      - name: Run Scraper
        run: python linkedin_scraper.py  # השם המדויק שנתת

      - name: Commit and Push changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add linkedin_jobs.db  # מוודא שקובץ הדאטה מתעדכן
          git commit -m "Auto-update jobs from LinkedIn" || exit 0
          git push
